# ?? Server ?????????????????????????????????????????????????????????????????????
server.port=${PORT:8080}
server.servlet.context-path=/api

# ?? JWT (30 min expiry as requested) ???????????????????????????????????????????
app.jwt.secret=${JWT_SECRET:incoin-super-secret-key-change-this-in-production-min-32chars}
app.jwt.expiry-hours=0.5

# ?? Incoin Third-party API ?????????????????????????????????????????????????????
app.incoin.base-url=https://api.incoinpay.net
app.incoin.version=46
app.incoin.os-version=33
app.incoin.client-type=Android
app.incoin.app-id=xyz.indianx.app
app.incoin.android-id=a1b2c3d4e5f60000

# ?? Redis ??????????????????????????????????????????????????????????????????????
spring.data.redis.host=${REDISHOST:127.0.0.1}
spring.data.redis.port=${REDISPORT:6379}
spring.data.redis.password=${REDISPASSWORD:}
spring.data.redis.timeout=2000ms


spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ?? Jackson ????????????????????????????????????????????????????????????????????
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
#
# ?? Logging ????????????????????????????????????????????????????????????????????
logging.level.com.incoin.demo=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n


