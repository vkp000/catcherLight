# ── Test profile — used by DemoApplicationTests ────────────────────────────────
# Disable Redis auto-configuration in tests so no live Redis is needed
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Dummy JWT secret (32+ chars required by HS256)
app.jwt.secret=test-secret-key-for-unit-tests-only-32chars
app.jwt.expiry-hours=1

# Suppress verbose output during tests
logging.level.root=WARN
logging.level.com.incoin.demo=INFO
