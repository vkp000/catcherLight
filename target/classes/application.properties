# ─── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ─── JWT ───────────────────────────────────────────────────────────────────────
# Override via environment variable JWT_SECRET in production
app.jwt.secret=${JWT_SECRET:incoin-super-secret-key-change-this-in-production-min-32chars}
app.jwt.expiry-hours=8

# ─── Incoin Third-party API ────────────────────────────────────────────────────
app.incoin.base-url=https://api.incoinpay.net
app.incoin.version=46
app.incoin.os-version=33
app.incoin.client-type=Android
app.incoin.app-id=xyz.indianx.app
app.incoin.android-id=a1b2c3d4e5f60000

# ─── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# ─── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.incoin.demo=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
